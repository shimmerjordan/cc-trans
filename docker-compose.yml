# cc-trans docker 部署。一键:docker compose up -d --build
#
# 挂载说明:
#   - ./config.json         : 你的配置(先 cp config.example.json config.json 并填好)
#   - ./data                : 指标持久化(cc-trans 自动写,重启不丢统计)
#   - ~/.claude             : 订阅 OAuth 凭证目录(oauth 模式需要;容器要能读写以自动刷新 token)
#
# 需要上游代理(HTTP/SOCKS5)时:把下面 build 的 WITH_UNDICI 改成 "1" 重新 build,并在 config.json 配 upstreamProxy。
services:
  cc-trans:
    build:
      context: .
      args:
        WITH_UNDICI: "0"
    image: cc-trans:latest
    container_name: cc-trans
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      # 订阅 OAuth:把宿主机的 Claude 登录态挂进容器(需读写以自动刷新)。apiKey 模式可删掉这行。
      - ${HOME}/.claude:/home/node/.claude
    environment:
      - CC_TRANS_PORT=8787
      # 容器内 node 用户 home 是 /home/node,凭证默认路径随之改到这里
      - CC_TRANS_OAUTH_CREDENTIALS=/home/node/.claude/.credentials.json
    # 日志轮转(控制磁盘占用):单文件 10MB、最多 5 个
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
